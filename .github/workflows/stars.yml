name: Refresh GitHub Stars

on:
  schedule:
    - cron: "47 4 * * 1"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: github-stars-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out master
        uses: actions/checkout@v7
        with:
          ref: master
      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Refresh GitHub Stars
        run: npm run stars:update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit updated counts
        id: commit
        run: |
          git config user.name "github-stars-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/profile.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: refresh GitHub Stars"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Deploy refreshed site
        if: steps.commit.outputs.changed == 'true'
        run: gh workflow run deploy.yml --ref master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
