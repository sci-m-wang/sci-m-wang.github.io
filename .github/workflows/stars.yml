name: Refresh GitHub Stars

on:
  schedule:
    - cron: "47 4 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-stars-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out master
        uses: actions/checkout@v4
        with:
          ref: master
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Refresh GitHub Stars
        run: npm run stars:update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit updated counts
        run: |
          git config user.name "github-stars-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/profile.json
          git diff --cached --quiet || git commit -m "chore: refresh GitHub Stars"
          git push
