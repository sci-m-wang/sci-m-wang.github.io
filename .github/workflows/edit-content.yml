name: Admin · Edit existing entry

on:
  workflow_dispatch:
    inputs:
      dataset:
        description: "Dataset containing the item"
        required: true
        type: choice
        options: [publications, funding, news, awards, metrics, engagements]
      id:
        description: "Stable item ID shown in the JSON data"
        required: true
        type: string
      patch_json:
        description: 'JSON fields to replace, e.g. {"year":2027,"venueShort":"ACL 2027"}'
        required: true
        type: string

permissions:
  contents: write

jobs:
  update:
    if: github.actor == github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Edit content item
        run: node scripts/content-admin.mjs
        env:
          CONTENT_OPERATION: edit
          DATASET: ${{ inputs.dataset }}
          ID: ${{ inputs.id }}
          PATCH_JSON: ${{ inputs.patch_json }}
      - name: Commit and publish data change
        run: |
          git config user.name "homepage-admin"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/publications.json src/data/profile.json
          git commit -m "content: edit ${{ inputs.dataset }} entry"
          git push origin HEAD:main
