name: Admin · Add news or coverage

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Display date, e.g. 2026.07"
        required: true
        type: string
      kind:
        description: "Item type"
        required: true
        type: choice
        options: [Publication, Award, Talk, Media, Project, Service, Other]
      title_en:
        description: "Headline in English"
        required: true
        type: string
      title_zh:
        description: "标题（中文）"
        required: true
        type: string
      url:
        description: "Related URL (optional)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  update:
    if: github.actor == github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - name: Check out master
        uses: actions/checkout@v4
        with:
          ref: master
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Add news item
        run: node scripts/content-admin.mjs
        env:
          CONTENT_OPERATION: add-news
          DATE: ${{ inputs.date }}
          KIND: ${{ inputs.kind }}
          TITLE_EN: ${{ inputs.title_en }}
          TITLE_ZH: ${{ inputs.title_zh }}
          URL: ${{ inputs.url }}
      - name: Commit and publish data change
        run: |
          git config user.name "homepage-admin"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/profile.json
          git commit -m "content: add news item"
          git push origin HEAD:master
