name: Refresh Google Scholar citations

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: citation-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out master
        uses: actions/checkout@v4
        with:
          ref: master
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Refresh citation data
        run: npm run citations:update
      - name: Commit updated counts
        id: commit
        run: |
          git config user.name "citation-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/publications.json src/data/profile.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: refresh citation counts"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Deploy refreshed site
        if: steps.commit.outputs.changed == 'true'
        run: gh workflow run deploy.yml --ref master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
