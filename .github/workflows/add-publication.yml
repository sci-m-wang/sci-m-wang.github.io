name: Admin · Add publication

on:
  workflow_dispatch:
    inputs:
      title:
        description: "Paper title"
        required: true
        type: string
      authors:
        description: "Authors (write Ming Wang in full for highlighting)"
        required: true
        type: string
      venue:
        description: "Full venue name"
        required: true
        type: string
      venue_short:
        description: "Short venue label, e.g. ACL 2027"
        required: true
        type: string
      year:
        description: "Publication year"
        required: true
        type: string
      category:
        description: "Authorship / status group"
        required: true
        type: choice
        options: [first, cofirst, coauthor, working]
      status:
        description: "Publication status"
        required: true
        type: choice
        options: [published, preprint]
      paper_url:
        description: "Landing page or abstract URL"
        required: false
        type: string
      pdf_url:
        description: "Direct PDF URL"
        required: false
        type: string
      code_url:
        description: "Code repository URL"
        required: false
        type: string
      arxiv_id:
        description: "arXiv ID only, e.g. 2604.11048"
        required: false
        type: string
      badges:
        description: "Comma-separated badges"
        required: false
        type: string
      selected:
        description: "Feature this publication"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  update:
    if: github.actor == github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Add publication
        run: node scripts/content-admin.mjs
        env:
          CONTENT_OPERATION: add-publication
          TITLE: ${{ inputs.title }}
          AUTHORS: ${{ inputs.authors }}
          VENUE: ${{ inputs.venue }}
          VENUE_SHORT: ${{ inputs.venue_short }}
          YEAR: ${{ inputs.year }}
          CATEGORY: ${{ inputs.category }}
          STATUS: ${{ inputs.status }}
          PAPER_URL: ${{ inputs.paper_url }}
          PDF_URL: ${{ inputs.pdf_url }}
          CODE_URL: ${{ inputs.code_url }}
          ARXIV_ID: ${{ inputs.arxiv_id }}
          BADGES: ${{ inputs.badges }}
          SELECTED: ${{ inputs.selected }}
      - name: Commit and publish data change
        run: |
          git config user.name "homepage-admin"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/publications.json
          git commit -m "content: add publication"
          git push origin HEAD:main
